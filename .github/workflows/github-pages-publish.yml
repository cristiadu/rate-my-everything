name: Publish on Github Pages
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5.0.0
        with:
          package_json_file: package.json
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Set git user
        run: |
          git fetch origin main
          git config --global user.name "$(git log -1 --pretty=format:'%an' origin/main)"
          git config --global user.email "$(git log -1 --pretty=format:'%ae' origin/main)"
      - name: Install Dependencies
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Release
        env:
          ACTIONS_DEPLOY_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release
